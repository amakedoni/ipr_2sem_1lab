<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Lab 5 - Frontend</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 36px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; font-size: 2rem; margin-bottom: 28px; }
        .info-card {
            background: rgba(255,255,255,0.18);
            padding: 20px 24px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .info-card h2 { margin-bottom: 10px; font-size: 1.2rem; }
        .info-card p { line-height: 1.6; opacity: 0.9; }
        .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
        }
        button:hover { background: #388E3C; }
        button.secondary { background: #1976D2; }
        button.secondary:hover { background: #1565C0; }
        #result {
            margin-top: 20px;
            padding: 18px;
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            display: none;
            word-break: break-all;
        }
        #result h3 { margin-bottom: 10px; }
        #result p { margin: 4px 0; line-height: 1.5; }
        pre { white-space: pre-wrap; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Kubernetes Lab 5 — Frontend</h1>

        <div class="info-card">
            <h2>Добро пожаловать!</h2>
            <p>Это frontend-приложение, запущенное в Kubernetes.<br>
            Используйте кнопки ниже для тестирования связи с backend и просмотра конфигурации.</p>
        </div>

        <div class="btn-row">
            <button onclick="fetchData()">📡 Данные от Backend</button>
            <button class="secondary" onclick="fetchConfig()">⚙️ Конфигурация</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        async function fetchData() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p>⏳ Загрузка...</p>';
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                resultDiv.innerHTML = `
                    <h3>✅ Ответ от Backend</h3>
                    <p><strong>Service:</strong> ${data.service}</p>
                    <p><strong>Message:</strong> ${data.message}</p>
                    <p><strong>Timestamp:</strong> ${data.timestamp}</p>
                    <p><strong>Pod:</strong> ${data.pod_name}</p>
                    <p><strong>Uptime:</strong> ${data.uptime?.toFixed(1)}s</p>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<h3>❌ Ошибка</h3><p>${error.message}</p>`;
            }
        }

        async function fetchConfig() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p>⏳ Загрузка...</p>';
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                resultDiv.innerHTML = `
                    <h3>⚙️ Текущая конфигурация (ConfigMap + Secret)</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<h3>❌ Ошибка</h3><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
