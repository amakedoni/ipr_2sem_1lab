# Задание 3: Мониторинг с Prometheus
#
# Шаг 1: Установить Prometheus через Helm
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install prometheus prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace
#
# Шаг 2: Проверить установку
#   kubectl get pods -n monitoring
#
# Шаг 3: Доступ к Prometheus UI
#   kubectl port-forward svc/prometheus-kube-prometheus-prometheus 9090:9090 -n monitoring
#   Открыть: http://localhost:9090
#
# Шаг 4: Доступ к Grafana
#   kubectl port-forward svc/prometheus-grafana 3000:80 -n monitoring
#   Открыть: http://localhost:3000  (admin / prom-operator)

---
# ServiceMonitor — указывает Prometheus, где собирать метрики с backend
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: lab5
  labels:
    release: prometheus   # должен совпадать с лейблом Helm-релиза
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
  - port: http
    path: /metrics
    interval: 15s

---
# ServiceMonitor для frontend
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: frontend-monitor
  namespace: lab5
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: frontend
  endpoints:
  - port: http
    path: /metrics
    interval: 15s

---
# PrometheusRule — пример алерта при недоступности backend
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend-alerts
  namespace: lab5
  labels:
    release: prometheus
spec:
  groups:
  - name: backend.rules
    rules:
    - alert: BackendDown
      expr: up{job="backend"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Backend сервис недоступен"
        description: "Pod {{ $labels.pod }} не отвечает более 1 минуты."
    - alert: HighCPUUsage
      expr: rate(container_cpu_usage_seconds_total{namespace="lab5"}[5m]) > 0.08
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Высокая нагрузка CPU в namespace lab5"
